<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Crawler</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}

  .container{max-width:1100px;margin:0 auto;padding:40px 20px}

  .header{text-align:center;margin-bottom:40px}
  .header h1{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,#6ee7b7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header p{color:#666;margin-top:8px;font-size:1rem}

  .input-area{background:#13131f;border-radius:16px;padding:28px;margin-bottom:30px;border:1px solid #1e1e30}
  .input-row{display:flex;gap:12px}
  .input-row input[type="url"]{flex:1;padding:14px 18px;border-radius:10px;border:1px solid #2a2a40;background:#0d0d18;color:#fff;font-size:1rem;outline:none;transition:border .2s}
  .input-row input[type="url"]:focus{border-color:#6ee7b7}
  .input-row input[type="url"]::placeholder{color:#444}
  .btn-crawl{padding:14px 32px;border:none;border-radius:10px;background:linear-gradient(135deg,#6ee7b7,#3b82f6);color:#000;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .1s,opacity .2s;white-space:nowrap}
  .btn-crawl:hover{transform:scale(1.03)}
  .btn-crawl:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .options{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
  .options label{font-size:.85rem;color:#666;display:flex;align-items:center;gap:6px}
  .options input{width:70px;padding:6px 10px;border-radius:6px;border:1px solid #2a2a40;background:#0d0d18;color:#fff;font-size:.85rem;outline:none}
  .options input:focus{border-color:#6ee7b7}

  .progress-area{background:#13131f;border-radius:16px;padding:24px 28px;margin-bottom:30px;border:1px solid #1e1e30;display:none}
  .progress-area.active{display:block}
  .progress-bar-wrap{width:100%;height:6px;background:#1e1e30;border-radius:3px;margin:14px 0;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6ee7b7,#3b82f6);border-radius:3px;transition:width .4s;width:0}
  .progress-text{font-size:.85rem;color:#888}
  .progress-url{font-size:.8rem;color:#6ee7b7;word-break:break-all;margin-top:6px}

  .results-area{display:none}
  .results-area.active{display:block}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
  .stat-card{background:#13131f;border-radius:12px;padding:18px;border:1px solid #1e1e30;text-align:center}
  .stat-card .num{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#6ee7b7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-card .label{font-size:.7rem;color:#666;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

  .download-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .btn-dl{padding:10px 20px;border-radius:8px;border:1px solid #2a2a40;background:#13131f;color:#e0e0e0;font-size:.9rem;cursor:pointer;text-decoration:none;transition:border .2s,background .2s}
  .btn-dl:hover{border-color:#6ee7b7;background:#1a1a2e}

  .pages-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .pages-header h2{font-size:1.2rem}
  .page-search{padding:8px 14px;border-radius:8px;border:1px solid #2a2a40;background:#0d0d18;color:#fff;font-size:.85rem;outline:none;width:260px}
  .page-search:focus{border-color:#6ee7b7}

  .page-card{background:#13131f;border-radius:12px;margin-bottom:14px;border:1px solid #1e1e30;overflow:hidden;transition:border .2s}
  .page-card:hover{border-color:#2a2a44}
  .page-card-head{padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px}
  .page-card-head .url{font-size:.85rem;color:#6ee7b7;word-break:break-all}
  .page-card-head .title{font-weight:600;color:#fff;font-size:.95rem}
  .page-card-head .meta-badges{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
  .badge{font-size:.7rem;padding:3px 8px;border-radius:6px;background:#1e1e30;color:#888;white-space:nowrap}
  .page-card-head .chevron{color:#444;font-size:1.1rem;transition:transform .2s;flex-shrink:0}
  .page-card.open .chevron{transform:rotate(90deg)}
  .page-card-body{display:none;padding:0 20px 20px}
  .page-card.open .page-card-body{display:block}

  .section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6ee7b7;margin:16px 0 8px}
  .section-title:first-child{margin-top:0}

  .text-content{background:#0d0d18;border-radius:8px;padding:14px;font-size:.82rem;line-height:1.6;color:#aaa;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}

  .link-list{list-style:none}
  .link-list li{padding:4px 0;font-size:.8rem;word-break:break-all}
  .link-list li a{color:#3b82f6;text-decoration:none}
  .link-list li a:hover{text-decoration:underline}
  .link-list .more{color:#555;font-style:italic}

  .headings-list{list-style:none}
  .headings-list li{padding:2px 0;font-size:.82rem;color:#bbb}
  .headings-list li.h1{font-weight:700;font-size:.95rem;color:#fff}
  .headings-list li.h2{padding-left:12px;font-weight:600}
  .headings-list li.h3{padding-left:24px}
  .headings-list li.h4{padding-left:36px;font-size:.78rem;color:#888}

  .img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:8px}
  .img-item{background:#0d0d18;border-radius:8px;overflow:hidden}
  .img-item img{width:100%;height:100px;object-fit:cover;display:block}
  .img-item .img-alt{padding:6px 8px;font-size:.7rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .ext-section{margin-top:24px}
  .ext-section h2{font-size:1.1rem;margin-bottom:12px}
  .ext-list{background:#13131f;border-radius:12px;padding:16px 20px;border:1px solid #1e1e30;max-height:400px;overflow-y:auto}
  .ext-list a{display:block;padding:4px 0;font-size:.82rem;color:#3b82f6;text-decoration:none;word-break:break-all}
  .ext-list a:hover{text-decoration:underline}

  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:3px}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid #2a2a40;border-top-color:#6ee7b7;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Web Crawler</h1>
    <p>Paste a URL, crawl the whole site, get everything as PDF</p>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://example.com" autofocus>
      <button class="btn-crawl" id="crawlBtn" onclick="startCrawl()">Crawl</button>
    </div>
    <div class="options">
      <label>Max pages <input type="number" id="maxPages" value="50" min="1" max="500"></label>
      <label>Delay (s) <input type="number" id="delay" value="0.3" min="0" max="5" step="0.1"></label>
    </div>
  </div>

  <div class="progress-area" id="progressArea">
    <div style="display:flex;align-items:center">
      <span class="spinner"></span>
      <span id="progressLabel" style="font-weight:600">Crawling...</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">Starting...</div>
    <div class="progress-url" id="progressUrl"></div>
  </div>

  <div class="results-area" id="resultsArea">
    <div class="stats" id="stats"></div>
    <div class="download-row" id="downloadRow"></div>
    <div class="pages-header">
      <h2>Pages</h2>
      <input class="page-search" id="pageSearch" placeholder="Search pages..." oninput="filterPages()">
    </div>
    <div id="pagesContainer"></div>
    <div class="ext-section" id="extSection" style="display:none">
      <h2>External Links</h2>
      <div class="ext-list" id="extList"></div>
    </div>
  </div>
</div>

<script>
let currentJob=null,pollTimer=null;

document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')startCrawl()});

async function startCrawl(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url)return;
  const maxPages=parseInt(document.getElementById('maxPages').value)||50;
  const delay=parseFloat(document.getElementById('delay').value)||0.3;

  document.getElementById('crawlBtn').disabled=true;
  document.getElementById('progressArea').classList.add('active');
  document.getElementById('resultsArea').classList.remove('active');
  document.getElementById('progressBar').style.width='0%';
  document.getElementById('progressText').textContent='Starting...';
  document.getElementById('progressUrl').textContent='';

  try{
    const res=await fetch('/api/crawl',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url,max_pages:maxPages,delay})
    });
    const data=await res.json();
    if(data.error){alert(data.error);document.getElementById('crawlBtn').disabled=false;document.getElementById('progressArea').classList.remove('active');return}
    currentJob=data.job_id;
    pollStatus();
  }catch(e){
    alert('Error: '+e.message);
    document.getElementById('crawlBtn').disabled=false;
    document.getElementById('progressArea').classList.remove('active');
  }
}

function pollStatus(){
  pollTimer=setInterval(async()=>{
    const res=await fetch(`/api/status/${currentJob}`);
    const data=await res.json();

    if(data.progress&&data.progress.length>0){
      const last=data.progress[data.progress.length-1];
      const pct=Math.round((last.page/last.total)*100);
      document.getElementById('progressBar').style.width=pct+'%';
      document.getElementById('progressText').textContent=last.page+' / '+last.total+' pages crawled';
      document.getElementById('progressUrl').textContent=last.url;
    }

    if(data.status==='done'){
      clearInterval(pollTimer);
      document.getElementById('progressArea').classList.remove('active');
      document.getElementById('crawlBtn').disabled=false;
      showResults(data.summary,data.id);
    }else if(data.status==='error'){
      clearInterval(pollTimer);
      document.getElementById('progressArea').classList.remove('active');
      document.getElementById('crawlBtn').disabled=false;
      alert('Crawl failed: '+(data.error||'Unknown error'));
    }
  },800);
}

function showResults(summary,jobId){
  document.getElementById('resultsArea').classList.add('active');

  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="num">${summary.pages_crawled}</div><div class="label">Pages Crawled</div></div>
    <div class="stat-card"><div class="num">${summary.total_internal_links}</div><div class="label">Internal Links</div></div>
    <div class="stat-card"><div class="num">${summary.total_external_links}</div><div class="label">External Links</div></div>
    <div class="stat-card"><div class="num">${summary.pages_with_errors}</div><div class="label">Errors</div></div>
  `;

  document.getElementById('downloadRow').innerHTML=`
    <a class="btn-dl" href="/api/download/${jobId}/json" target="_blank">Download JSON</a>
    <a class="btn-dl" href="/api/download/${jobId}/pdf" target="_blank">Download PDF</a>
  `;

  renderPages(summary.pages);

  const extLinks=summary.external_links||[];
  if(extLinks.length>0){
    document.getElementById('extSection').style.display='block';
    document.getElementById('extList').innerHTML=extLinks.map(l=>
      `<a href="${esc(l)}" target="_blank" rel="noopener">${esc(l)}</a>`
    ).join('');
  }else{
    document.getElementById('extSection').style.display='none';
  }
}

function renderPages(pages){window._allPages=pages;filterPages()}

function filterPages(){
  const q=(document.getElementById('pageSearch').value||'').toLowerCase();
  const pages=(window._allPages||[]).filter(p=>
    p.url.toLowerCase().includes(q)||(p.title||'').toLowerCase().includes(q)
  );

  document.getElementById('pagesContainer').innerHTML=pages.map((p,i)=>`
    <div class="page-card" id="pc${i}">
      <div class="page-card-head" onclick="toggleCard(${i})">
        <div style="flex:1;min-width:0">
          <div class="title">${esc(p.title||'No title')}</div>
          <div class="url">${esc(p.url)}</div>
        </div>
        <div class="meta-badges">
          <span class="badge">${p.word_count} words</span>
          <span class="badge">${p.image_count} imgs</span>
          <span class="badge">${p.internal_link_count} int</span>
          <span class="badge">${p.external_link_count} ext</span>
        </div>
        <span class="chevron">&#9654;</span>
      </div>
      <div class="page-card-body">
        ${p.description?`<div style="font-size:.85rem;color:#888;margin-bottom:10px">${esc(p.description)}</div>`:''}
        ${p.headings&&p.headings.length?`
          <div class="section-title">Headings</div>
          <ul class="headings-list">${p.headings.map(h=>`<li class="h${h.level}">${esc(h.text)}</li>`).join('')}</ul>
        `:''}
        ${p.text?`
          <div class="section-title">Page Content</div>
          <div class="text-content">${esc(p.text)}</div>
        `:''}
        ${p.images&&p.images.length?`
          <div class="section-title">Images (${p.images.length})</div>
          <div class="img-grid">${p.images.map(img=>`
            <div class="img-item">
              <img src="${esc(img.src)}" alt="${esc(img.alt)}" loading="lazy" onerror="this.parentElement.style.display='none'">
              ${img.alt?`<div class="img-alt">${esc(img.alt)}</div>`:''}
            </div>
          `).join('')}</div>
        `:''}
        ${p.internal_links&&p.internal_links.length?`
          <div class="section-title">Internal Links (${p.internal_links.length})</div>
          <ul class="link-list">
            ${p.internal_links.slice(0,20).map(l=>`<li><a href="${esc(l)}" target="_blank" rel="noopener">${esc(l)}</a></li>`).join('')}
            ${p.internal_links.length>20?`<li class="more">...and ${p.internal_links.length-20} more</li>`:''}
          </ul>
        `:''}
        ${p.external_links&&p.external_links.length?`
          <div class="section-title">External Links (${p.external_links.length})</div>
          <ul class="link-list">
            ${p.external_links.slice(0,20).map(l=>`<li><a href="${esc(l)}" target="_blank" rel="noopener">${esc(l)}</a></li>`).join('')}
            ${p.external_links.length>20?`<li class="more">...and ${p.external_links.length-20} more</li>`:''}
          </ul>
        `:''}
      </div>
    </div>
  `).join('');
}

function toggleCard(i){document.getElementById('pc'+i).classList.toggle('open')}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
